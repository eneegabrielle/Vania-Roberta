<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- ESSENCIAL PRA CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALERTA CRÍTICO ⚠️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    text-align: center;
}

/* Terminal */
#terminal {
    position: relative;
    z-index: 2;
    padding: 15px;
    font-size: 16px;
    max-width: 100%;
}

/* Cursor */
.cursor {
    display: inline-block;
    background: #00ff88;
    width: 8px;
    animation: blink 1s infinite;
}

/* Botão */
#btn {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 16px;
    width: 80%;
    max-width: 300px;
    background: transparent;
    color: #00ff88;
    border: 2px solid #00ff88;
    cursor: pointer;
    border-radius: 8px;
}

/* Mensagem */
#secret {
    display: none;
    margin-top: 25px;
    font-size: 18px;
    color: #ff4d6d;
    padding: 0 10px;
}

/* Corações */
.heart {
    position: absolute;
    color: red;
    animation: floatUp linear infinite;
}

/* Coração gigante */
#bigHeart {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 80px; /* menor pro celular */
    opacity: 0;
    z-index: 3;
}

/* Animações */
@keyframes blink {
    0%,50%,100% {opacity:1;}
    25%,75% {opacity:0;}
}

@keyframes floatUp {
    from {transform: translateY(100vh); opacity:1;}
    to {transform: translateY(-10vh); opacity:0;}
}

.explode {
    animation: boom 1s ease-out forwards;
}

@keyframes boom {
    0% {transform: translate(-50%, -50%) scale(0); opacity:0;}
    50% {transform: translate(-50%, -50%) scale(1.3); opacity:1;}
    100% {transform: translate(-50%, -50%) scale(1.8); opacity:0;}
}
</style>
</head>

<body>

<div id="terminal">
    <div id="text"></div><span class="cursor"></span>
    
    <br>
    <button id="btn">CLIQUE AQUI ❤️</button>
    
    <div id="secret"></div>
</div>

<div id="bigHeart">❤️</div>

<audio id="music">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// TEXTO
const message = `
ALERTA CRÍTICO ⚠️

Sistema comprometido!

Causa:
Vania Roberta invadiu todos os meus pensamentos ❤️

Efeito colateral:
- Coração acelerado
- Sorrisos involuntários
- Vontade absurda de te beijar

Status:
Sem intenção de corrigir esse "problema"
`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}
typeWriter();

// CLICK
document.getElementById("btn").addEventListener("click", function() {

    document.getElementById("secret").style.display = "block";
    document.getElementById("secret").innerText = `
💖 Vania Roberta...

Você não é só um pensamento...
Você é o motivo de todos eles.

Eu te amo ❤️
`;

    document.getElementById("music").play();

    const heart = document.getElementById("bigHeart");
    heart.classList.remove("explode");
    void heart.offsetWidth;
    heart.classList.add("explode");
});

// CORAÇÕES
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 15 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
